name: Docs (Sphinx)

on:
  push:
    branches: [ master ]
    paths:
      - docs/**
      - BUILD
      - README.md
      - LINUX_RUNTIME_NOTES.md
      - RELEASE_WORKFLOW.md
      - STATIC_BUILD_LINUX.md
      - .github/workflows/docs-sphinx.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build docs
        run: |
          cd docs
          uv sync
          uv run --project . sphinx-build -b html source build/html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs/build/html
          force_orphan: true
