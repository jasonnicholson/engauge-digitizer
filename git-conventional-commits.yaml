---
convention:
  commitTypes:
  - feat
  - fix
  - perf
  - docs
  - chore
  - build
  - refactor
  commitScopes: []
  releaseTagGlobPattern: "v[0-9]*.[0-9]*"
changelog:
  commitTypes:
  - feat
  - fix
  - perf
  - docs
  - build
  - refactor
  includeInvalidCommits: false
  commitIgnoreRegexPattern:
  headlines:
    feat: Features
    fix: Bug Fixes
    perf: Performance improvements
    docs: Documentation
    build: Build System
    breakingChange: BREAKING CHANGES

  commitUrl: https://github.com/jasonnicholson/engauge-digitizer/commit/%commit%
  commitRangeUrl: https://github.com/jasonnicholson/engauge-digitizer/compare/%from%...%to%?diff=split

  issueRegexPattern: "#[0-9]+"
  issueUrl: https://github.com/jasonnicholson/engauge-digitizer/issues/%issue%